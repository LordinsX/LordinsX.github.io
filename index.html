<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта полигона</title>
  <style>
    body { font-family: sans-serif; padding: 15px; text-align: center; }
    .hidden { display: none !important; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; max-width: 90%; }
    button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    input, select { padding: 8px; margin: 5px; width: 80%; max-width: 300px; }
    #mapContainer { height: 60vh; background: #e0e0e0; margin-top: 10px; border: 1px solid #999; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>Карта полигона</h2>
  
  <div id="loginScreen">
    <h3>Вход на полигон</h3>
    <div id="joinForm" class="hidden">
      <p>Вступление во взвод по QR-коду</p>
      <input type="text" id="joinNick" placeholder="Ваш позывной">
      <button onclick="joinPlatoon()">Вступить</button>
    </div>
    
    <div id="normalLogin">
      <select id="loginTeam"><option value="red">🔴 Красные</option><option value="blue">🔵 Синие</option></select>
      <input type="text" id="loginNick" placeholder="Ваш позывной">
      <button onclick="loginAsSoldier()">Войти как солдат</button>
      <hr>
      <h4>Вход для командира взвода</h4>
      <select id="cmdTeam"><option value="red">🔴 Красные</option><option value="blue">🔵 Синие</option></select>
      <input type="text" id="cmdPlatoonId" placeholder="ID взвода">
      <input type="password" id="cmdPass" placeholder="Пароль взвода">
      <button onclick="loginAsCommander()">Войти как командир</button>
    </div>
  </div>

  <div id="mapScreen" class="hidden">
    <h3 id="userRoleDisplay"></h3>
    <button id="showQrBtn" class="hidden" onclick="document.getElementById('qrModal').classList.remove('hidden')">📱 Показать QR-код для солдат</button>
    <button onclick="sendSOS()">SOS</button>
    <button onclick="logout()">Выйти</button>
    
    <div id="mapContainer">
      <h4>Видимые объекты:</h4>
      <div id="entitiesList" style="text-align: left; padding: 10px;"></div>
    </div>
  </div>

  <div id="qrModal" class="modal hidden">
    <div class="modal-content">
      <h3>Отсканируйте для вступления во взвод</h3>
      <img id="cmdQrImage" src="" style="max-width: 250px;">
      <br><br>
      <button onclick="document.getElementById('qrModal').classList.add('hidden')">Закрыть</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

	const firebaseConfig = {
		apiKey: "AIzaSyAZRbc37dj2vaiACjAsD0mXUfyne_Wd9gw",
		authDomain: "lordinsxtest.firebaseapp.com",
		databaseURL: "https://lordinsxtest-default-rtdb.europe-west1.firebasedatabase.app",
		projectId: "lordinsxtest",
		storageBucket: "lordinsxtest.firebasestorage.app",
		messagingSenderId: "611910355892",
		appId: "1:611910355892:web:c6ecbd24579c8ee95800e1"
	};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.db = db;
    window.ref = ref;
    window.onValue = onValue;
    window.set = set;
    window.update = update;
    window.push = push;
    window.get = get;

    const urlParams = new URLSearchParams(window.location.search);
    let myRole = localStorage.getItem('role');
    let myTeam = localStorage.getItem('team');
    let myPlatoonId = localStorage.getItem('platoonId');
    let myName = localStorage.getItem('nick');
    let joinToken = localStorage.getItem('joinToken');

    let playersData = {};
    let platoonsData = {};

    if (urlParams.get('action') === 'join') {
      document.getElementById('normalLogin').classList.add('hidden');
      document.getElementById('joinForm').classList.remove('hidden');
      localStorage.setItem('pendingTeam', urlParams.get('team'));
      localStorage.setItem('pendingPlatoon', urlParams.get('platoon'));
      localStorage.setItem('pendingToken', urlParams.get('token'));
    } else if (myRole) {
      showMap();
    }

    window.joinPlatoon = async function() {
      const nick = document.getElementById('joinNick').value;
      const team = localStorage.getItem('pendingTeam');
      const platoonId = localStorage.getItem('pendingPlatoon');
      const token = localStorage.getItem('pendingToken');

      const snapshot = await get(ref(db, `platoons/${team}/${platoonId}`));
      const platoon = snapshot.val();
      
      if (platoon && platoon.joinToken === token) {
        const newPlayerRef = push(ref(db, `players/${team}`));
        await set(newPlayerRef, {
          id: newPlayerRef.key, nick, team, platoonId, role: 'soldier', timestamp: Date.now()
        });
        await push(ref(db, 'logs'), {
          timestamp: Date.now(), type: 'info', message: `👤 ${nick} вступил во взвод "${platoon.name}" (${team})`
        });
        localStorage.setItem('role', 'soldier');
        localStorage.setItem('team', team);
        localStorage.setItem('platoonId', platoonId);
        localStorage.setItem('nick', nick);
        window.location.href = window.location.pathname;
      } else {
        alert('Неверная ссылка или срок действия истек');
      }
    };

    window.loginAsSoldier = function() {
      const nick = document.getElementById('loginNick').value;
      const team = document.getElementById('loginTeam').value;
      localStorage.setItem('role', 'soldier');
      localStorage.setItem('team', team);
      localStorage.setItem('nick', nick);
      showMap();
    };

    window.loginAsCommander = async function() {
      const team = document.getElementById('cmdTeam').value;
      const platoonId = document.getElementById('cmdPlatoonId').value;
      const password = document.getElementById('cmdPass').value;

      const snapshot = await get(ref(db, `platoons/${team}/${platoonId}`));
      const platoon = snapshot.val();
      
      if (platoon && platoon.password === password) {
        await update(ref(db, `platoons/${team}/${platoonId}`), { lastActive: Date.now() });
        localStorage.setItem('role', 'commander');
        localStorage.setItem('team', team);
        localStorage.setItem('platoonId', platoonId);
        localStorage.setItem('nick', platoon.name);
        localStorage.setItem('joinToken', platoon.joinToken);
        showMap();
      } else {
        alert('Неверный ID взвода или пароль');
      }
    };

    function showMap() {
      myRole = localStorage.getItem('role');
      myTeam = localStorage.getItem('team');
      myPlatoonId = localStorage.getItem('platoonId');
      myName = localStorage.getItem('nick');
      joinToken = localStorage.getItem('joinToken');

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mapScreen').classList.remove('hidden');
      
      const roleText = myRole === 'commander' ? `👑 Командир: ${myName}` : `👤 Солдат: ${myName}`;
      document.getElementById('userRoleDisplay').innerText = roleText;

      if (myRole === 'commander' && joinToken) {
        document.getElementById('showQrBtn').classList.remove('hidden');
        const joinUrl = `${window.location.origin}/index.html?action=join&team=${myTeam}&platoon=${myPlatoonId}&token=${joinToken}`;
        document.getElementById('cmdQrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(joinUrl)}`;
      }

      onValue(ref(db, 'players'), (snapshot) => {
        playersData = snapshot.val() || {};
        renderMap();
      });

      onValue(ref(db, 'platoons'), (snapshot) => {
        platoonsData = snapshot.val() || {};
        renderMap();
      });
    }

    function renderMap() {
      const list = document.getElementById('entitiesList');
      list.innerHTML = '';

      if (myRole === 'soldier') {
        for (const team in platoonsData) {
          if (team === myTeam) {
            for (const pId in platoonsData[team]) {
              const cmd = platoonsData[team][pId];
              list.innerHTML += `<div style="color:blue; font-weight:bold;">👑 ${cmd.name} (Взвод: ${pId})</div>`;
            }
          }
        }
      } else if (myRole === 'commander') {
        for (const pId in playersData[myTeam] || {}) {
          const player = playersData[myTeam][pId];
          if (player.platoonId === myPlatoonId) {
            list.innerHTML += `<div>👤 ${player.nick} (Солдат)</div>`;
          }
        }
        for (const pId in platoonsData[myTeam] || {}) {
          const cmd = platoonsData[myTeam][pId];
          list.innerHTML += `<div style="color:blue; font-weight:bold;">👑 ${cmd.name} (Командир)</div>`;
        }
      }
    }

    window.sendSOS = async function() {
      await push(ref(db, 'logs'), {
        timestamp: Date.now(), type: 'sos', message: `🚨 SOS от ${myName} (${myTeam})`
      });
      alert('SOS отправлен организаторам!');
    };

    window.logout = function() {
      localStorage.clear();
      window.location.reload();
    };
  </script>
</body>
</html>

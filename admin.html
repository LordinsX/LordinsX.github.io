<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель</title>
  <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
  <h2>🔐 Вход для организатора</h2>
  <input type="password" id="adminPass" placeholder="Пароль">
  <button onclick="login()">Войти</button>
  <p id="loginError" style="color:red"></p>

  <div id="adminPanel" style="display:none;">
    <h3>➕ Добавить взвод (Командира)</h3>
    <select id="pTeam"><option value="red">🔴 Красные</option><option value="blue">🔵 Синие</option></select>
    <input id="pId" placeholder="ID взвода (лат., напр. alpha)">
    <input id="pName" placeholder="Название взвода">
    <input id="pPass" type="password" placeholder="Пароль для входа командира">
    <button onclick="createPlatoon()">Создать взвод</button>
    
    <div id="qrResult" style="margin-top:20px; display:none;">
      <p>QR-код для командира (для показа солдатам):</p>
      <img id="qrImage" src="" alt="QR Code" style="border:1px solid #ccc;">
      <p><small>Ссылка: <span id="qrLink"></span></small></p>
    </div>

    <h3>👑 Игроки</h3>
    <button onclick="clearAll()">🗑 Сбросить всех</button>
    <h3>📜 Журнал событий</h3>
    <ul id="logs" style="max-height:300px; overflow-y:auto;"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ADMIN_PASSWORD = "admin123"; // Замените на свой пароль

    window.login = function() {
      const password = document.getElementById('adminPass').value;
      if (password === ADMIN_PASSWORD) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('loginError').innerText = '';
        startListening();
      } else {
        document.getElementById('loginError').innerText = 'Неверный пароль';
      }
    };

    window.createPlatoon = async function() {
      const team = document.getElementById('pTeam').value;
      const platoonId = document.getElementById('pId').value;
      const name = document.getElementById('pName').value;
      const password = document.getElementById('pPass').value;

      const joinToken = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
      
      await set(ref(db, `platoons/${team}/${platoonId}`), {
        name, password, joinToken, team, platoonId, timestamp: Date.now()
      });
      
      await push(ref(db, 'logs'), {
        timestamp: Date.now(), type: 'info', message: `✅ Админ создал взвод "${name}" (${team})`
      });

      const joinUrl = `${window.location.origin}/index.html?action=join&team=${team}&platoon=${platoonId}&token=${joinToken}`;
      document.getElementById('qrResult').style.display = 'block';
      document.getElementById('qrLink').innerText = joinUrl;
      document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(joinUrl)}`;
    };

    window.clearAll = async function() {
      if(!confirm('Удалить всех игроков?')) return;
      await remove(ref(db, 'players'));
      await push(ref(db, 'logs'), {
        timestamp: Date.now(), type: 'info', message: '🗑 Админ сбросил всех игроков'
      });
    };

    function startListening() {
      onValue(ref(db, 'logs'), (snapshot) => {
        const logsObj = snapshot.val() || {};
        const logs = Object.values(logsObj).sort((a, b) => a.timestamp - b.timestamp).slice(-40);
        const logsList = document.getElementById('logs');
        logsList.innerHTML = '';
        logs.forEach(log => {
          const li = document.createElement('li');
          li.innerText = `[${new Date(log.timestamp).toLocaleTimeString()}] ${log.message}`;
          logsList.appendChild(li);
        });
      });
    }
  </script>
</body>
</html>
